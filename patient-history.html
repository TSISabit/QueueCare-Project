<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient History — QueueCare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="patient-history">
  <div id="navbarMount"></div>

  <main class="page-shell">
    <div class="container">
      <div class="page-head">
        <div>
          <div class="page-chip">Patient Profile</div>
          <h1>Consultation History</h1>
          <p class="muted">View your profile details and appointment timeline.</p>
        </div>
        <a href="patient-dashboard.html" class="btn btn-outline">Back to Dashboard</a>
      </div>

      <div class="two-col">
        <div class="card form-card">
          <h3>Profile Overview</h3>
          <div class="flex" style="margin-top:14px;align-items:flex-start;">
            <div class="avatar" id="profileAvatar">P</div>
            <div>
              <div><strong id="profileName">-</strong></div>
              <div class="muted small" id="profileEmail">-</div>
              <div class="muted small" id="profilePhone">-</div>
            </div>
          </div>
        </div>

        <div class="card form-card">
          <h3>Privacy</h3>
          <p class="muted">Only records associated with the logged-in patient account are shown here.</p>
        </div>
      </div>

      <div class="card timeline-card" style="margin-top:20px;">
        <h3>Visit Timeline</h3>
        <div id="fullPatientHistory" class="timeline-list"></div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>QueueCare.renderPatientHistoryPage();</script>
</body>
</html>
