<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Login — QueueCare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <section class="auth-wrap">
    <div class="auth-grid">
      <div class="card auth-panel">
        <span class="eyebrow light">Patient Portal</span>
        <h1>Login to your patient account</h1>
        <p>Access your appointments, serial number, estimated waiting time, and visit history.</p>

        <div class="auth-links">
          <a class="auth-chip" href="index.html">Home</a>
          <a class="auth-chip" href="patient-register.html">Create Account</a>
          <a class="auth-chip" href="doctor-login.html">Doctor Login</a>
        </div>
      </div>

      <div class="card auth-form">
        <h2>Patient Login</h2>
        <div id="authNotice" class="notice">Enter your registered credentials to continue.</div>

        <form id="authForm" class="form-grid" style="margin-top:16px;" novalidate>
          <div class="field">
            <label>Email Address</label>
            <input type="email" name="email" required />
          </div>

          <div class="field">
            <label>Password</label>
            <input type="password" name="password" required />
          </div>

          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Login</button>
            <a class="btn btn-outline" href="patient-register.html">Register</a>
          </div>
        </form>
      </div>
    </div>
  </section>

  <script src="app.js"></script>
  <script>QueueCare.setupAuth('patient', 'login');</script>
</body>
</html>
